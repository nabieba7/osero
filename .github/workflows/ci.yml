name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: |
          node --check server.js
          node --check db.js
          node --check auth.js
          node --check public/auth.js

      - name: Verify modules load
        run: |
          node -e "require('./db'); console.log('db OK')"
          node -e "require('./auth'); console.log('auth OK')"
          node -e "const express = require('express'); const { authMiddleware, requireAuth } = require('./auth'); console.log('server deps OK')"

      - name: Start server briefly
        run: |
          timeout 5 node server.js || true
          echo "Server startup test done"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Deploy notification
        run: echo "✅ CI passed - Railway will auto-deploy from main branch"
